# GPU smoke (fast). Exercises the torch dense path end-to-end; NOT evidence.
# Runs on torch CPU (device: auto -> cpu without CUDA) or CUDA when available.
experiment:
  name: natural_gradient_local_rate_gpu_smoke

grid:
  N_theta: [4, 8, 16]
  kappa_target: [5]
  potential_family: ["separable", "random_feature"]
  seeds: [0]

monte_carlo:
  M_mc: [2048, 4096]
  antithetic: true
  chunk_size: 1024

operator:
  estimator: "symmetrized"
  diagonal_benchmark: true
  separable_exact_benchmark: true
  compute_gamma_loc: true
  backend: "torch"
  device: "auto"
  dtype: "float64"
  eigensolver: "torch_dense_eigh"
  explicit_dense_max_N_theta: 64
  basis_block_size: 32
  chunk_size: 1024
  eigsh_tol: 1.0e-5
  eigsh_maxiter: 500
  quadrature_nodes: 80

outputs:
  base_dir: outputs/natural_gradient_local_rate
