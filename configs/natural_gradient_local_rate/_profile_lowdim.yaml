# TEMPORARY profiling config (small subset of gpu_lowdim_operator_full) for
# benchmarking the low-dimensional high-M torch path on H200. Not a production
# scan: 2 N_theta x 1 kappa x 4 families x 1 seed = 8 rows at fixed M=4,194,304.
experiment:
  name: natural_gradient_local_rate_profile_lowdim

grid:
  N_theta: [8, 16]
  kappa_target: [5]
  potential_family: ["gaussian", "separable", "random_feature", "radial_tail"]
  seeds: [0]

monte_carlo:
  M_mc: 4194304
  antithetic: true
  chunk_size: 131072

operator:
  estimator: "symmetrized"
  diagonal_benchmark: true
  separable_exact_benchmark: true
  compute_gamma_loc: true
  backend: "torch"
  device: "auto"
  dtype: "float64"
  eigensolver: "torch_dense_eigh"
  explicit_dense_max_N_theta: 16
  basis_block_size: 32
  chunk_size: 131072
  eigsh_tol: 1.0e-6
  eigsh_maxiter: 1000
  quadrature_nodes: 160

potential:
  feature_multiplier: 4
  phi: "log_cosh"
  empirical_LA_safety_factor: 2.0

linearized_rate:
  compute_lambda_hat: true
  save_eigenvectors: true

outputs:
  base_dir: outputs/natural_gradient_local_rate
