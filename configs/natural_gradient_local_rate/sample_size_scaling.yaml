# Sample-size scaling (smoke). Sweeps M_mc at fixed dimension/kappa/family/seed
# to separate real dimension-dependence from finite-sample spectral noise.
# Cheap enough to run directly; scale up M_mc / seeds for production evidence.
experiment:
  name: natural_gradient_local_rate_sample_size_scaling

grid:
  N_theta: [16, 32, 64]
  kappa_target: [5]
  potential_family: ["gaussian", "separable", "random_feature"]
  seeds: [0, 1]

monte_carlo:
  M_mc: [2048, 4096, 8192, 16384, 32768, 65536]
  antithetic: true
  chunk_size: 512

operator:
  estimator: "symmetrized"        # raw_forward, symmetrized
  diagonal_benchmark: true
  separable_exact_benchmark: true
  compute_gamma_loc: true
  backend: "numpy"
  chunk_size: 512
  eigsh_tol: 1.0e-5
  eigsh_maxiter: 500
  quadrature_nodes: 80

outputs:
  base_dir: outputs/natural_gradient_local_rate
