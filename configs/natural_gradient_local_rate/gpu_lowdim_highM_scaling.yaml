# Stage 1 GPU calibration: low-dimensional, high-M sample-size scaling.
#
# Purpose:
#   Calibrate finite-sample spectral inflation in a regime where N_theta is not
#   too large, so Gaussian/separable baselines can become meaningfully small.
#   Use this before any dense low-dimensional production scan.
#
# Interpretation:
#   - Gaussian true benchmark: Lambda=0, gamma=1.
#   - Separable diagonal/exact benchmarks check estimator convergence.
#   - Random_feature and radial_tail should be interpreted only after subtracting
#     Gaussian/separable baselines at matched N_theta, M_mc, and seed.
#
# Run explicitly on GPU; do not use as a local smoke.
experiment:
  name: natural_gradient_local_rate_gpu_lowdim_highM_scaling

grid:
  N_theta: [8, 16, 24, 32]
  kappa_target: [5]
  potential_family: ["gaussian", "separable", "random_feature", "radial_tail"]
  seeds: [0, 1, 2]

monte_carlo:
  M_mc: [262144, 524288, 1048576, 2097152, 4194304]
  antithetic: true
  chunk_size: 8192

operator:
  estimator: "symmetrized"
  diagonal_benchmark: true
  separable_exact_benchmark: true
  compute_gamma_loc: true
  backend: "torch"
  device: "auto"
  dtype: "float64"
  eigensolver: "torch_dense_eigh"
  explicit_dense_max_N_theta: 32
  basis_block_size: 32
  chunk_size: 8192
  eigsh_tol: 1.0e-6
  eigsh_maxiter: 1000
  quadrature_nodes: 160

potential:
  feature_multiplier: 4
  phi: "log_cosh"
  empirical_LA_safety_factor: 2.0

outputs:
  base_dir: outputs/natural_gradient_local_rate
