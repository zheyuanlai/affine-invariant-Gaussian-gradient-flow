# Deep GPU sample-size scaling at N_theta=64. Run explicitly on an A100.
# This is expensive and should not be used as a local smoke.
experiment:
  name: natural_gradient_local_rate_gpu_N64_deep_scaling

grid:
  N_theta: [64]
  kappa_target: [5]
  potential_family: ["gaussian", "separable", "random_feature"]
  seeds: [0, 1]

monte_carlo:
  M_mc: [262144, 524288, 1048576, 2097152]
  antithetic: true
  chunk_size: 4096

operator:
  estimator: "symmetrized"
  diagonal_benchmark: true
  separable_exact_benchmark: true
  compute_gamma_loc: true
  backend: "torch"
  device: "auto"
  dtype: "float64"
  eigensolver: "torch_dense_eigh"
  explicit_dense_max_N_theta: 64
  basis_block_size: 32
  chunk_size: 4096
  eigsh_tol: 1.0e-6
  eigsh_maxiter: 1000
  quadrature_nodes: 120

outputs:
  base_dir: outputs/natural_gradient_local_rate
